<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="pageTitle.alertRouting">Alert Routing Overview - ServerMonitor</title>
    <!-- 0. Local Dedge fallback CSS (works when DedgeAuth server is offline) -->
    <link rel="stylesheet" href="css/DedgeAuth-fallback.css">
        <!-- 1. Local App CSS (loaded first) -->
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/config-editor.css">
    
    <!-- 2. DedgeAuth Common CSS (enforces consistent theming) -->
    <link rel="stylesheet" href="api/DedgeAuth/ui/common.css">
    
    <!-- 3. Tenant-specific CSS (injected via API) -->
    <style id="DedgeAuth-tenant-css"></style>
    
    <!-- 4. User menu component (loaded last) -->
    <link rel="stylesheet" href="api/DedgeAuth/ui/user.css">
    
    <style>
        .alert-routing-page {
            min-height: 100vh;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 20px;
        }

        .routing-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .routing-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .routing-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .routing-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-secondary);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .routing-table th,
        .routing-table td {
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .routing-table th {
            background: var(--bg-tertiary);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .routing-table th:first-child,
        .routing-table td:first-child {
            text-align: left;
            font-weight: 500;
        }

        .routing-table tbody tr:hover {
            background: var(--bg-hover);
        }

        .status-cell {
            cursor: pointer;
            position: relative;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .status-badge:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .status-enabled {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .status-disabled {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .channel-icon {
            font-size: 1.2rem;
        }

        .env-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .env-name {
            font-weight: 600;
        }

        .env-patterns {
            font-size: 0.75rem;
            color: var(--text-secondary);
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .env-default {
            font-size: 0.7rem;
            background: var(--accent-color);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* Tooltip styles */
        .tooltip {
            display: none;
            position: absolute;
            z-index: 1000;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 16px;
            max-width: 350px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            text-align: left;
            font-size: 0.85rem;
        }

        .tooltip.visible {
            display: block;
        }

        .tooltip-title {
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tooltip-reasons {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .tooltip-reasons li {
            padding: 4px 0;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .tooltip-reasons li::before {
            content: "•";
            color: var(--text-secondary);
        }

        .reason-enabled {
            color: #22c55e;
        }

        .reason-disabled {
            color: #ef4444;
        }

        /* Monitor suppressions section */
        .suppressions-section {
            margin-top: 32px;
        }

        .suppressions-section h2 {
            font-size: 1.1rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .suppressions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .suppression-card {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 16px;
            border: 1px solid var(--border-color);
        }

        .suppression-card h3 {
            font-size: 0.95rem;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .suppression-channels {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .suppression-tag {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .loading {
            text-align: center;
            padding: 48px;
            color: var(--text-secondary);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .legend {
            display: flex;
            gap: 24px;
            margin-bottom: 16px;
            font-size: 0.85rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-reload {
            padding: 8px 16px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-reload:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="alert-routing-page">
        <div class="routing-container">
            <div class="routing-header">
                <div id="DedgeAuthHeader" data-app-title="ServerMonitor Dashboard" data-home-url="index.html"></div>
                <h1>
                    <span>📊</span>
                    <span data-i18n="routing.title">Alert Routing Overview</span>
                </h1>
                <button class="btn-reload" id="reloadBtn">
                    <span>🔄</span> <span data-i18n="button.reload">Reload</span>
                </button>
                <div id="DedgeAuthUserMenu"></div>
            <div id="DedgeAuthThemePill"></div>
            </div>

            <div class="legend">
                <div class="legend-item">
                    <span class="status-badge status-enabled"><span>✅</span> <span data-i18n="status.enabled">Enabled</span></span>
                    <span data-i18n="routing.enabledLegend">Channel will send alerts</span>
                </div>
                <div class="legend-item">
                    <span class="status-badge status-disabled"><span>❌</span> <span data-i18n="status.disabled">Disabled</span></span>
                    <span data-i18n="routing.disabledLegend">Channel is blocked</span>
                </div>
                <div class="legend-item">
                    <span><span>💡</span> <span data-i18n="routing.clickDetails">Click a cell for details</span></span>
                </div>
            </div>

            <div id="errorContainer"></div>
            
            <div id="loadingContainer" class="loading">
                <p data-i18n="routing.loading">Loading alert routing configuration...</p>
            </div>

            <table class="routing-table" id="routingTable" style="display: none;">
                <thead>
                    <tr id="headerRow">
                        <th data-i18n="table.channel">Channel</th>
                        <!-- Environment headers will be added dynamically -->
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Rows will be added dynamically -->
                </tbody>
            </table>

            <div class="suppressions-section" id="suppressionsSection" style="display: none;">
                <h2>
                    <span>⚠️</span>
                    <span data-i18n="routing.perMonitor">Per-Monitor Channel Suppressions</span>
                </h2>
                <p style="margin-bottom: 16px; color: var(--text-secondary); font-size: 0.9rem;" data-i18n="routing.perMonitorDesc">
                    These monitors have specific channels suppressed in their SuppressedChannels setting.
                </p>
                <div class="suppressions-grid" id="suppressionsGrid">
                    <!-- Suppression cards will be added dynamically -->
                </div>
            </div>
        </div>

        <div class="tooltip" id="tooltip">
            <div class="tooltip-title" id="tooltipTitle"></div>
            <ul class="tooltip-reasons" id="tooltipReasons"></ul>
        </div>
    </div>

    <script src="api/DedgeAuth/ui/user.js"></script>
    <script src="api/DedgeAuth/ui/i18n.js"></script>
    <script>
        const channelIcons = {
            'SMS': '📱',
            'Email': '📧',
            'EventLog': '📋',
            'File': '📁',
            'WKMonitor': '🔔'
        };

        let routingData = null;

        async function loadRoutingData() {
            const loadingContainer = document.getElementById('loadingContainer');
            const errorContainer = document.getElementById('errorContainer');
            const routingTable = document.getElementById('routingTable');
            const suppressionsSection = document.getElementById('suppressionsSection');

            loadingContainer.style.display = 'block';
            routingTable.style.display = 'none';
            suppressionsSection.style.display = 'none';
            errorContainer.innerHTML = '';

            try {
                const response = await fetch('api/config/alert-routing');
                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error || 'Failed to load routing data');
                }

                routingData = data;
                renderRoutingTable(data);
                renderSuppressions(data.monitorSuppressions);

                loadingContainer.style.display = 'none';
                routingTable.style.display = 'table';

            } catch (error) {
                console.error('Error loading routing data:', error);
                loadingContainer.style.display = 'none';
                errorContainer.innerHTML = `
                    <div class="error-message">
                        <strong>Error:</strong> ${error.message}
                    </div>
                `;
            }
        }

        function renderRoutingTable(data) {
            const headerRow = document.getElementById('headerRow');
            const tableBody = document.getElementById('tableBody');

            // Clear existing content (except first header)
            headerRow.innerHTML = '<th data-i18n="table.channel">Channel</th>';
            tableBody.innerHTML = '';

            // Add environment headers
            for (const env of data.environments) {
                const th = document.createElement('th');
                th.innerHTML = `
                    <div class="env-header">
                        <span class="env-name">${env.name}</span>
                        ${env.isDefault ? '<span class="env-default">Default</span>' : ''}
                        <span class="env-patterns" title="${env.patterns.join(', ')}">${env.patterns.slice(0, 2).join(', ')}${env.patterns.length > 2 ? '...' : ''}</span>
                    </div>
                `;
                headerRow.appendChild(th);
            }

            // Add channel rows
            for (const channel of data.routingMatrix) {
                const tr = document.createElement('tr');
                
                // Channel name cell
                const tdChannel = document.createElement('td');
                tdChannel.innerHTML = `
                    <span class="channel-icon">${channelIcons[channel.channelName] || '📌'}</span>
                    ${channel.channelName}
                `;
                tr.appendChild(tdChannel);

                // Environment status cells
                for (const env of data.environments) {
                    const status = channel.environmentStatus[env.name];
                    const td = document.createElement('td');
                    td.className = 'status-cell';
                    td.dataset.channel = channel.channelName;
                    td.dataset.environment = env.name;
                    
                    const isEnabled = status?.enabled ?? false;
                    td.innerHTML = `
                        <span class="status-badge ${isEnabled ? 'status-enabled' : 'status-disabled'}">
                            ${isEnabled ? '✅ Enabled' : '❌ Disabled'}
                        </span>
                    `;

                    // Store reasons for tooltip
                    td.dataset.reasons = JSON.stringify(status?.reasons || []);
                    td.dataset.enabled = isEnabled;

                    // Add click handler for tooltip
                    td.addEventListener('click', showTooltip);

                    tr.appendChild(td);
                }

                tableBody.appendChild(tr);
            }
        }

        function renderSuppressions(suppressions) {
            const section = document.getElementById('suppressionsSection');
            const grid = document.getElementById('suppressionsGrid');
            grid.innerHTML = '';

            const entries = Object.entries(suppressions || {});
            if (entries.length === 0) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';

            for (const [monitor, channels] of entries) {
                const card = document.createElement('div');
                card.className = 'suppression-card';
                card.innerHTML = `
                    <h3>${monitor.replace('Monitoring', '')}</h3>
                    <div class="suppression-channels">
                        ${channels.map(ch => `<span class="suppression-tag">${channelIcons[ch] || ''} ${ch}</span>`).join('')}
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        function showTooltip(event) {
            const cell = event.currentTarget;
            const tooltip = document.getElementById('tooltip');
            const tooltipTitle = document.getElementById('tooltipTitle');
            const tooltipReasons = document.getElementById('tooltipReasons');

            const channel = cell.dataset.channel;
            const environment = cell.dataset.environment;
            const isEnabled = cell.dataset.enabled === 'true';
            const reasons = JSON.parse(cell.dataset.reasons || '[]');

            tooltipTitle.innerHTML = `
                <span class="channel-icon">${channelIcons[channel] || ''}</span>
                ${channel} - ${environment}
                <span class="status-badge ${isEnabled ? 'status-enabled' : 'status-disabled'}" style="margin-left: auto;">
                    ${isEnabled ? '✅ Enabled' : '❌ Disabled'}
                </span>
            `;

            tooltipReasons.innerHTML = reasons.map(reason => {
                const isPositive = reason.toLowerCase().includes('enabled') || reason.toLowerCase().includes('allowed');
                return `<li class="${isPositive ? 'reason-enabled' : 'reason-disabled'}">${reason}</li>`;
            }).join('');

            // Position tooltip
            const rect = cell.getBoundingClientRect();
            tooltip.style.top = `${rect.bottom + window.scrollY + 8}px`;
            tooltip.style.left = `${Math.max(16, rect.left + window.scrollX - 100)}px`;
            tooltip.classList.add('visible');

            // Hide on click outside
            setTimeout(() => {
                document.addEventListener('click', hideTooltip, { once: true });
            }, 10);
        }

        function hideTooltip(event) {
            const tooltip = document.getElementById('tooltip');
            if (!tooltip.contains(event?.target)) {
                tooltip.classList.remove('visible');
            }
        }

        // Apply theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        // Event listeners
        document.getElementById('reloadBtn').addEventListener('click', loadRoutingData);

        // Initial load
        loadRoutingData();
    </script>
    <script src="api/DedgeAuth/ui/header.js" defer></script>
</body>
</html>
