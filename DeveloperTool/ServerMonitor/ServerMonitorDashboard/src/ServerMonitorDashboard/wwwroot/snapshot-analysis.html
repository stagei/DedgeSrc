<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="pageTitle.snapshot">Snapshot History Analysis</title>
    <link rel="stylesheet" href="css/DedgeAuth-fallback.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="api/DedgeAuth/ui/common.css">
    <style id="DedgeAuth-tenant-css"></style>
    <link rel="stylesheet" href="api/DedgeAuth/ui/user.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --accent: var(--accent-color);
            --border: var(--border-color);
            --warning: var(--warning-color);
            --critical: var(--error-color);
            --success: var(--success-color);
            --info: var(--info-color);
            --bg-header: var(--bg-tertiary);
            --bg-hover: var(--bg-tertiary);
            --warning-bg: rgba(251, 191, 36, 0.15);
            --critical-bg: rgba(248, 113, 113, 0.15);
            --info-bg: rgba(56, 189, 248, 0.15);
        }

        .popout-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }

        .popout-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid var(--accent);
        }

        .popout-header h1 {
            margin: 0;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .controls-form {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--bg-card);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .controls-form label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .controls-form select,
        .controls-form input[type="datetime-local"] {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.4rem 0.6rem;
            font-size: 0.9rem;
        }

        .controls-form select:focus,
        .controls-form input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn-generate {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 0.5rem 1.2rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-generate:hover { background: var(--accent-hover, var(--accent)); }
        .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-save-json {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.5rem 1.2rem;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-save-json:hover { background: var(--bg-tertiary); }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.55);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }
        .loading-overlay.visible { opacity: 1; pointer-events: auto; }

        .loading-spinner {
            width: 56px; height: 56px;
            border: 5px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-bottom: 1.2rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 500;
        }
        .loading-progress {
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .panel {
            background: var(--bg-card);
            border-radius: 8px;
            margin-bottom: 1rem;
            overflow: hidden;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            background: var(--bg-header);
            border-bottom: 1px solid var(--border);
        }
        .panel-header h3 { margin: 0; font-size: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .panel-body { padding: 1rem; }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .summary-card {
            background: var(--bg-secondary);
            padding: 0.9rem;
            border-radius: 6px;
            text-align: center;
        }
        .summary-card .card-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        .summary-card .card-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        .chart-container {
            position: relative;
            height: 280px;
            margin-bottom: 1.5rem;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        .data-table th, .data-table td {
            padding: 0.5rem 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .data-table th {
            background: var(--bg-header);
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .data-table tbody tr:hover { background: var(--bg-hover); }

        .severity-error { color: var(--critical); font-weight: 600; }
        .severity-warning { color: var(--warning); font-weight: 600; }
        .severity-info { color: var(--info); font-weight: 600; }

        .no-data {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            font-size: 1rem;
        }

        .error-message {
            background: var(--critical-bg);
            color: var(--critical);
            padding: 1rem;
            border-radius: 6px;
            margin: 1rem;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text" data-i18n="snapshot.loading">Collecting and preparing data...</div>
        <div class="loading-progress" id="loading-progress"></div>
    </div>

    <div class="popout-container">
        <header class="popout-header">
            <div id="DedgeAuthHeader" data-app-title="ServerMonitor Dashboard" data-home-url="index.html"></div>
            <h1><span>📊</span> <span data-i18n="snapshot.title">Snapshot History Analysis</span></h1>
            <div id="DedgeAuthUserMenu"></div>
            <div id="DedgeAuthThemePill"></div>
        </header>

        <div class="controls-form">
            <label for="serverSelect" data-i18n="label.server">Server:</label>
            <select id="serverSelect">
                <option value="" data-i18n="placeholder.loadingServers">-- Loading servers... --</option>
            </select>

            <label for="dateFrom" data-i18n="label.from">From:</label>
            <input type="datetime-local" id="dateFrom">

            <label for="dateTo" data-i18n="label.to">To:</label>
            <input type="datetime-local" id="dateTo">

            <button class="btn-generate" id="btnGenerate" disabled data-i18n="button.generateReport">Generate Report</button>
            <button class="btn-save-json hidden" id="btnSaveJson" title="Save the analysis report as a JSON file"><span>💾</span> <span data-i18n="button.saveJson">Save JSON</span></button>
            <button class="btn-save-json hidden" id="btnSaveHtml" title="Save the full report as a standalone HTML file"><span>📄</span> <span data-i18n="button.saveHtml">Save HTML</span></button>
        </div>

        <div id="report-area" class="hidden">
            <div class="summary-cards" id="summaryCards"></div>

            <section class="panel">
                <div class="panel-header"><h3><span>🖥️</span> <span data-i18n="snapshot.cpuUsage">CPU Usage Over Time</span></h3></div>
                <div class="panel-body">
                    <div class="chart-container"><canvas id="cpuChart"></canvas></div>
                </div>
            </section>

            <section class="panel">
                <div class="panel-header"><h3><span>🧠</span> <span data-i18n="snapshot.memoryUsage">Memory Usage Over Time</span></h3></div>
                <div class="panel-body">
                    <div class="chart-container"><canvas id="memoryChart"></canvas></div>
                </div>
            </section>

            <section class="panel">
                <div class="panel-header"><h3><span>💾</span> <span data-i18n="snapshot.diskUsage">Disk Usage Over Time</span></h3></div>
                <div class="panel-body">
                    <div class="chart-container"><canvas id="diskChart"></canvas></div>
                </div>
            </section>

            <section class="panel">
                <div class="panel-header"><h3><span>📈</span> <span data-i18n="snapshot.statistics">Statistics</span></h3></div>
                <div class="panel-body" id="statsTableArea"></div>
            </section>

            <section class="panel">
                <div class="panel-header"><h3><span>💽</span> <span data-i18n="snapshot.diskSummary">Disk Space Summary</span></h3></div>
                <div class="panel-body" id="diskTableArea"></div>
            </section>

            <section class="panel">
                <div class="panel-header"><h3><span>🚨</span> <span data-i18n="snapshot.alertSummary">Alert Summary</span></h3></div>
                <div class="panel-body" id="alertTableArea"></div>
            </section>

        <section class="panel" id="alertTimelinePanel">
               <div class="panel-header"><h3><span>📉</span> <span data-i18n="snapshot.alertsOverTime">Alerts Over Time</span></h3></div>
               <div class="panel-body" id="alertTimelineArea"></div>
           </section>

            <section class="panel">
                <div class="panel-header"><h3><span>📋</span> <span data-i18n="snapshot.alertLog">Complete Alert Log</span></h3></div>
                <div class="panel-body" id="alertDetailArea"></div>
            </section>
        </div>

        <div id="no-report" class="no-data" data-i18n-html="snapshot.noReport">
            Select a server and date range, then click <strong>Generate Report</strong>.
        </div>
    </div>

    <script src="api/DedgeAuth/ui/user.js"></script>
    <script src="api/DedgeAuth/ui/i18n.js"></script>
    <script src="js/role-permissions.js"></script>
    <script src="js/snapshot-analysis.js"></script>
    <script src="api/DedgeAuth/ui/header.js" defer></script>
</body>
</html>
