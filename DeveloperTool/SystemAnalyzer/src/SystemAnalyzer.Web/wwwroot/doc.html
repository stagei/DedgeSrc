<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SystemAnalyzer — Program Documentation</title>
  <link rel="stylesheet" href="css/DedgeAuth-fallback.css">
  <link rel="stylesheet" href="api/DedgeAuth/ui/common.css">
  <style id="DedgeAuth-tenant-css"></style>
  <link rel="stylesheet" href="api/DedgeAuth/ui/user.css">
  <link rel="stylesheet" href="css/app.css" />
  <script>
    function getPreferredTheme(){var s=localStorage.getItem('sa-theme');if(s)return s;return window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'}
    function setTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('sa-theme',t)}
    setTheme(getPreferredTheme());
  </script>
</head>
<body class="doc-page">

<div class="header" style="padding:12px 20px;gap:14px">
  <h1 id="docTitle">Program Documentation</h1>
  <span class="doc-type-badge" id="typeBadge" style="display:none"></span>
  <div style="flex:1"></div>
  <a href="viewer.html" style="font-size:12px;color:var(--text2)">Viewer</a>
  <a href="graph.html" style="font-size:12px;color:var(--text2)">Graph</a>
  <a href="index.html" style="font-size:12px;color:var(--text2)">Home</a>
  <div id="DedgeAuthUserMenu"></div>
</div>

<div class="doc-main" id="docMain">
  <div class="doc-loading" id="docLoading">Loading documentation...</div>
</div>

<div class="doc-fullscreen-overlay" id="fullscreenOverlay">
  <div class="doc-fullscreen-header">
    <span class="title" id="fullscreenTitle">Diagram</span>
    <div class="controls">
      <button class="btn" id="fsZoomIn" title="Zoom In">+</button>
      <button class="btn" id="fsZoomOut" title="Zoom Out">&minus;</button>
      <span class="zoom-pct" id="fsZoomPct">100%</span>
      <button class="btn" id="fsFit" title="Fit">Fit</button>
      <button class="btn" id="fsClose" title="Close">&times;</button>
    </div>
  </div>
  <div class="doc-fullscreen-body" id="fullscreenBody"></div>
</div>

<script src="api/DedgeAuth/ui/user.js"></script>
<script src="lib/mermaid.min.js"></script>
<script type="module" src="js/doc.js?v=1"></script>
</body>
</html>
