    renew_lifetime = 7d
    forwardable = true
    rdns = false
    default_tkt_enctypes = aes256-cts-hmac-sha1-96 aes128-cts-hmac-sha1-96 rc4-hmac
    default_tgs_enctypes = aes256-cts-hmac-sha1-96 aes128-cts-hmac-sha1-96 rc4-hmac
    permitted_enctypes = aes256-cts-hmac-sha1-96 aes128-cts-hmac-sha1-96 rc4-hmac

[realms]
    DEDGE.FK.NO = {
        kdc = p-no1dc-vm01.DEDGE.fk.no
        kdc = p-no1dc-vm02.DEDGE.fk.no
        admin_server = p-no1dc-vm01.DEDGE.fk.no
    }

[domain_realm]
    .DEDGE.fk.no = DEDGE.FK.NO
    DEDGE.fk.no = DEDGE.FK.NO

[logging]
    kdc = FILE:C:\Windows\Logs\krb5\kdc.log
    admin_server = FILE:C:\Windows\Logs\krb5\kadmin.log
