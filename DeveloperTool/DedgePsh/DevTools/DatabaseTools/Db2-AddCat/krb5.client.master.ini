[libdefaults]
    default_keytab_name = FILE:C:\ProgramData\IBM\DB2\DB2COPY1\cfg\keytabs\p-no1fkxprd-db\db2.keytab
    trace = TRUE
    debug = TRUE
    default_realm = DEDGE.FK.NO
