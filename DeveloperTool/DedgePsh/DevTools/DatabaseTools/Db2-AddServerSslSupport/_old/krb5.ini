[libdefaults]
    default_realm = DEDGE.FK.NO
    default_tkt_enctypes = aes256-cts-hmac-sha1-96 aes128-cts-hmac-sha1-96 rc4-hmac
    default_tgs_enctypes = aes256-cts-hmac-sha1-96 aes128-cts-hmac-sha1-96 rc4-hmac
    permitted_enctypes = aes256-cts-hmac-sha1-96 aes128-cts-hmac-sha1-96 rc4-hmac
    clockskew = 300
    ticket_lifetime = 24h
    renew_lifetime = 7d
    forwardable = true
    proxiable = true
    dns_lookup_realm = false
    dns_lookup_kdc = false
    allow_weak_crypto = false

[realms]
    DEDGE.FK.NO = {
        kdc = p-no1dc-vm01.DEDGE.fk.no:88
        kdc = p-no1dc-vm02.DEDGE.fk.no:88
        admin_server = p-no1dc-vm01.DEDGE.fk.no:749
        default_domain = DEDGE.fk.no
        kpasswd_server = p-no1dc-vm01.DEDGE.fk.no:464
    }

[domain_realm]
    .DEDGE.fk.no = DEDGE.FK.NO
    DEDGE.fk.no = DEDGE.FK.NO
    .fk.no = DEDGE.FK.NO
    fk.no = DEDGE.FK.NO

[logging]
    default = FILE:C:\temp\krb5libs.log
    kdc = FILE:C:\temp\krb5kdc.log
    admin_server = FILE:C:\temp\kadmind.log

[appdefaults]
    pam = {
        debug = false
        ticket_lifetime = 36000
        renew_lifetime = 36000
        forwardable = true
        krb4_convert = false
    }

# Generic Kerberos configuration for DEDGE.FK.NO domain
# This file is suitable for Windows SSO scenarios where no keytab is required
# For server-specific configurations with keytab support, use the generated
# krb5.ini files from the V2 configuration scripts

# NOTE: For Windows SSO (securityMechanism=15), this file may not be needed
# For Kerberos SSO (securityMechanism=11), this provides basic realm configuration 