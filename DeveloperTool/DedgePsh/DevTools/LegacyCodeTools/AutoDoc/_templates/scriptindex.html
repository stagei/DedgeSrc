<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoDoc - Code Documentation</title>
  <link rel="icon" type="image/x-icon" href="./_images/dedge.ico">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- DataTables Bootstrap 5 -->
  <link href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  
  <style>
    /* Theme CSS Variables */
    :root {
      /* Light Theme (default) */
      --bg-primary: #f8fafc;
      --bg-secondary: #e2e8f0;
      --bg-card: #ffffff;
      --bg-hover: #f1f5f9;
      --accent-cobol: #0891b2;
      --accent-script: #ea580c;
      --accent-sql: #2563eb;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border-color: #cbd5e1;
      --shadow-glow: rgba(8, 145, 178, 0.15);
      --gradient-start: rgba(8, 145, 178, 0.08);
      --gradient-end: rgba(37, 99, 235, 0.06);
    }

    [data-theme="dark"] {
      --bg-primary: #0f1419;
      --bg-secondary: #1a1f2e;
      --bg-card: #1e2433;
      --bg-hover: #252d3d;
      --accent-cobol: #00d4aa;
      --accent-script: #ff6b35;
      --accent-sql: #5c9eff;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #6e7681;
      --border-color: #30363d;
      --shadow-glow: rgba(0, 212, 170, 0.15);
      --gradient-start: rgba(0, 212, 170, 0.08);
      --gradient-end: rgba(92, 158, 255, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      margin: 0;
      padding: 0;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* Gradient background effect */
    .bg-pattern {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(ellipse at 20% 0%, var(--gradient-start) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, var(--gradient-end) 0%, transparent 50%),
        var(--bg-primary);
      z-index: -1;
      transition: background 0.3s ease;
    }

    .container-main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 0;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border-color);
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .logo-section img {
      height: 40px;
      width: auto;
    }

    .title-section h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin: 0;
      background: linear-gradient(135deg, var(--accent-cobol), var(--accent-sql));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .title-section p {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin: 0.25rem 0 0 0;
    }

    /* Header right section */
    .header-right {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    /* Theme Toggle */
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 50px;
      padding: 0.5rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .theme-toggle:hover {
      border-color: var(--accent-cobol);
    }

    .theme-toggle-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .theme-toggle-btn.active {
      background: var(--accent-cobol);
      color: var(--bg-primary);
    }

    .theme-toggle-btn i {
      font-size: 1rem;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 2rem;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent-cobol);
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Tab Navigation */
    .nav-tabs-custom {
      display: flex;
      gap: 0.5rem;
      padding: 0;
      margin-bottom: 1.5rem;
      border: none;
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 0.5rem;
      transition: background-color 0.3s ease;
    }

    .nav-tab-btn {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.875rem 1.5rem;
      background: transparent;
      border: none;
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .nav-tab-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .nav-tab-btn.active {
      background: var(--bg-card);
      color: var(--text-primary);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .nav-tab-btn .icon {
      font-size: 1.1rem;
    }

    .nav-tab-btn.active.cobol { color: var(--accent-cobol); }
    .nav-tab-btn.active.script { color: var(--accent-script); }
    .nav-tab-btn.active.sql { color: var(--accent-sql); }

    .nav-tab-btn .badge {
      background: var(--bg-hover);
      color: var(--text-secondary);
      font-size: 0.7rem;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
    }

    .nav-tab-btn.active .badge {
      background: rgba(0, 0, 0, 0.1);
    }

    /* Tab Content */
    .tab-content-custom {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      border: 1px solid var(--border-color);
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }

    [data-theme="dark"] .tab-content-custom {
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
    }

    .tab-pane {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .tab-pane.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Search box */
    .search-wrapper {
      margin-bottom: 1.5rem;
    }

    .dataTables_filter {
      display: none !important;
    }

    .custom-search {
      position: relative;
      max-width: 400px;
    }

    .custom-search input {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.75rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }

    .custom-search input:focus {
      outline: none;
      border-color: var(--accent-cobol);
      box-shadow: 0 0 0 3px var(--shadow-glow);
    }

    .custom-search input::placeholder {
      color: var(--text-muted);
    }

    .custom-search .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    /* DataTable Styling */
    .table {
      color: var(--text-primary);
      margin-bottom: 0;
    }

    .table thead th {
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 1rem;
      border-bottom: 1px solid var(--border-color);
      border-top: none;
    }

    .table tbody tr {
      transition: background 0.15s ease;
    }

    .table tbody tr:hover {
      background: var(--bg-hover) !important;
    }

    .table tbody td {
      padding: 0.875rem 1rem;
      border-bottom: 1px solid var(--border-color);
      vertical-align: middle;
      color: var(--text-primary);
    }

    .table tbody tr:last-child td {
      border-bottom: none;
    }

    /* Links in table */
    .table a {
      color: var(--accent-cobol);
      text-decoration: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      transition: color 0.15s ease;
    }

    .table a:hover {
      color: var(--accent-sql);
      text-decoration: underline;
    }

    /* Type badges */
    .type-badge {
      display: inline-block;
      padding: 0.25rem 0.625rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    /* DataTables info & pagination */
    .dataTables_info {
      color: var(--text-muted) !important;
      font-size: 0.85rem;
      padding-top: 1rem !important;
    }

    .dataTables_length {
      display: none;
    }

    .dataTables_wrapper .dataTables_paginate {
      padding-top: 1rem !important;
    }

    .dataTables_wrapper .dataTables_paginate .paginate_button {
      background: var(--bg-secondary) !important;
      border: 1px solid var(--border-color) !important;
      color: var(--text-secondary) !important;
      border-radius: 6px !important;
      margin: 0 2px !important;
      padding: 0.5rem 0.75rem !important;
    }

    .dataTables_wrapper .dataTables_paginate .paginate_button:hover {
      background: var(--bg-hover) !important;
      color: var(--text-primary) !important;
    }

    .dataTables_wrapper .dataTables_paginate .paginate_button.current {
      background: var(--accent-cobol) !important;
      border-color: var(--accent-cobol) !important;
      color: white !important;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* Loading state */
    .loading-spinner {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border-color);
      border-top-color: var(--accent-cobol);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    .empty-state i {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 2rem 0;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container-main {
        padding: 1rem;
      }

      .header {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }

      .header-right {
        flex-direction: column;
        gap: 1rem;
      }

      .stats-bar {
        justify-content: center;
      }

      .nav-tabs-custom {
        flex-wrap: wrap;
      }

      .nav-tab-btn {
        flex: 1;
        justify-content: center;
        min-width: 120px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  
  <div class="container-main">
    <!-- Header -->
    <header class="header">
      <div class="logo-section">
        <img src="./_images/dedge.svg" alt="Dedge">
        <div class="title-section">
          <h1>AutoDoc</h1>
          <p>Code Documentation & Flowcharts</p>
        </div>
      </div>
      <div class="header-right">
        <div class="stats-bar">
          <div class="stat-item">
            <div class="stat-value" id="cobol-count">-</div>
            <div class="stat-label">COBOL</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="script-count">-</div>
            <div class="stat-label">Scripts</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="sql-count">-</div>
            <div class="stat-label">Tables</div>
          </div>
        </div>
        <!-- Theme Toggle -->
        <div class="theme-toggle" title="Toggle theme">
          <button class="theme-toggle-btn" id="theme-light" onclick="setTheme('light')" title="Light mode">
            <i class="bi bi-sun-fill"></i>
          </button>
          <button class="theme-toggle-btn" id="theme-dark" onclick="setTheme('dark')" title="Dark mode">
            <i class="bi bi-moon-fill"></i>
          </button>
        </div>
      </div>
    </header>

    <!-- Tab Navigation -->
    <nav class="nav-tabs-custom" role="tablist">
      <button class="nav-tab-btn active cobol" data-tab="cobol" role="tab">
        <i class="bi bi-code-square icon"></i>
        <span>COBOL Programs</span>
        <span class="badge" id="cobol-badge">0</span>
      </button>
      <button class="nav-tab-btn script" data-tab="script" role="tab">
        <i class="bi bi-terminal icon"></i>
        <span>Scripts</span>
        <span class="badge" id="script-badge">0</span>
      </button>
      <button class="nav-tab-btn sql" data-tab="sql" role="tab">
        <i class="bi bi-database icon"></i>
        <span>SQL Tables</span>
        <span class="badge" id="sql-badge">0</span>
      </button>
    </nav>

    <!-- Tab Content -->
    <div class="tab-content-custom">
      <!-- COBOL Tab -->
      <div class="tab-pane active" id="cobol" role="tabpanel">
        <div class="search-wrapper">
          <div class="custom-search">
            <i class="bi bi-search search-icon"></i>
            <input type="text" id="cobol-search" placeholder="Search COBOL programs...">
          </div>
        </div>
        <div class="loading-spinner" id="cobol-loading">
          <div class="spinner"></div>
          <span>Loading COBOL programs...</span>
        </div>
        <table id="cobolTable" class="table" style="display:none;">
          <thead>
            <tr>
              <th style="width: 25%">Program</th>
              <th style="width: 40%">Description</th>
              <th style="width: 20%">System</th>
              <th style="width: 15%">Type</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <!-- Script Tab -->
      <div class="tab-pane" id="script" role="tabpanel">
        <div class="search-wrapper">
          <div class="custom-search">
            <i class="bi bi-search search-icon"></i>
            <input type="text" id="script-search" placeholder="Search scripts...">
          </div>
        </div>
        <div class="loading-spinner" id="script-loading">
          <div class="spinner"></div>
          <span>Loading scripts...</span>
        </div>
        <table id="scriptTable" class="table" style="display:none;">
          <thead>
            <tr>
              <th style="width: 60%">Script</th>
              <th style="width: 40%">Type</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <!-- SQL Tab -->
      <div class="tab-pane" id="sql" role="tabpanel">
        <div class="search-wrapper">
          <div class="custom-search">
            <i class="bi bi-search search-icon"></i>
            <input type="text" id="sql-search" placeholder="Search tables...">
          </div>
        </div>
        <div class="loading-spinner" id="sql-loading">
          <div class="spinner"></div>
          <span>Loading SQL tables...</span>
        </div>
        <table id="sqlTable" class="table" style="display:none;">
          <thead>
            <tr>
              <th style="width: 40%">Table Name</th>
              <th style="width: 60%">Description</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <p>AutoDoc &copy; Dedge AS &bull; Generated documentation for legacy code systems</p>
    </footer>
  </div>

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>

  <script>
    // Theme management
    function getPreferredTheme() {
      const stored = localStorage.getItem('autodoc-theme');
      if (stored) return stored;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('autodoc-theme', theme);
      updateThemeButtons(theme);
    }

    function updateThemeButtons(theme) {
      document.getElementById('theme-light').classList.toggle('active', theme === 'light');
      document.getElementById('theme-dark').classList.toggle('active', theme === 'dark');
    }

    // Initialize theme
    setTheme(getPreferredTheme());

    // Listen for system theme changes
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      if (!localStorage.getItem('autodoc-theme')) {
        setTheme(e.matches ? 'dark' : 'light');
      }
    });

    // Tab switching
    document.querySelectorAll('.nav-tab-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const tabId = this.dataset.tab;
        
        // Update buttons
        document.querySelectorAll('.nav-tab-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        
        // Update panes
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
      });
    });

    // DataTable configurations
    const tableConfig = {
      paging: true,
      pageLength: 25,
      lengthChange: false,
      info: true,
      ordering: true,
      order: [[0, 'asc']],
      language: {
        info: 'Showing _START_ to _END_ of _TOTAL_ entries',
        infoEmpty: 'No entries found',
        emptyTable: 'No data available'
      }
    };

    // Initialize tables
    let cobolTable, scriptTable, sqlTable;

    $(document).ready(function() {
      loadCobolData();
      loadScriptData();
      loadSqlData();
    });

    function loadCobolData() {
      $.ajax({
        url: './.json/CblParseResult.json',
        method: 'GET',
        dataType: 'json',
        success: function(data) {
          $('#cobol-loading').hide();
          $('#cobolTable').show();
          
          cobolTable = $('#cobolTable').DataTable({
            ...tableConfig,
            data: data,
            columns: [
              { data: 'programNameLink' },
              { data: 'description' },
              { data: 'system' },
              { data: 'type' }
            ]
          });

          const count = data.length;
          $('#cobol-count').text(count);
          $('#cobol-badge').text(count);

          // Custom search
          $('#cobol-search').on('keyup', function() {
            cobolTable.search(this.value).draw();
          });
        },
        error: function() {
          $('#cobol-loading').html('<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>Failed to load COBOL data</p></div>');
        }
      });
    }

    function loadScriptData() {
      $.ajax({
        url: './.json/ScriptParseResult.json',
        method: 'GET',
        dataType: 'json',
        success: function(data) {
          $('#script-loading').hide();
          $('#scriptTable').show();
          
          scriptTable = $('#scriptTable').DataTable({
            ...tableConfig,
            data: data,
            columns: [
              { data: 'scriptNameLink' },
              { data: 'type' }
            ]
          });

          const count = data.length;
          $('#script-count').text(count);
          $('#script-badge').text(count);

          // Custom search
          $('#script-search').on('keyup', function() {
            scriptTable.search(this.value).draw();
          });
        },
        error: function() {
          $('#script-loading').html('<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>Failed to load script data</p></div>');
        }
      });
    }

    function loadSqlData() {
      $.ajax({
        url: './.json/SqlParseResult.json',
        method: 'GET',
        dataType: 'json',
        success: function(data) {
          $('#sql-loading').hide();
          $('#sqlTable').show();
          
          sqlTable = $('#sqlTable').DataTable({
            ...tableConfig,
            data: data,
            columns: [
              { data: 'tableNameLink' },
              { data: 'description' }
            ]
          });

          const count = data.length;
          $('#sql-count').text(count);
          $('#sql-badge').text(count);

          // Custom search
          $('#sql-search').on('keyup', function() {
            sqlTable.search(this.value).draw();
          });
        },
        error: function() {
          $('#sql-loading').html('<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>Failed to load SQL data</p></div>');
        }
      });
    }
  </script>
</body>
</html>
